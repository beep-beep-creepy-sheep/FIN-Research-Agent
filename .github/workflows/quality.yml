name: Market terminal quality gates

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install fastapi sqlalchemy "psycopg[binary]" python-multipart alembic
      - name: Ruff
        run: ruff check .
      - name: Python tests
        run: PYTHONPATH=.:backend/src pytest -q
      - name: Stage 3 source fixture and download safety tests
        run: PYTHONPATH=.:backend/src pytest -q backend/tests/test_stage3_official_sources.py
      - name: Python type check
        run: PYTHONPATH=.:backend/src python -m mypy backend/src/finresearch
      - name: Alembic empty SQLite upgrade
        run: ALEMBIC_DATABASE_URL=sqlite:///./data/ci-empty.sqlite PYTHONPATH=.:backend/src alembic upgrade head
      - name: tracked-secret-file-check
        run: make tracked-secret-file-check
      - name: Secret scan
        run: make secret-scan
      - name: Python dependency audit
        run: make python-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
      - name: Type check
        run: npx tsc --noEmit
      - name: npm dependency audit
        run: npm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install fastapi sqlalchemy "psycopg[binary]" python-multipart alembic
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Build frontend for e2e
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
        run: npm run build
      - name: Start backend
        run: |
          rm -f data/e2e.sqlite
          mkdir -p data
          PYTHONPATH=.:backend/src DATABASE_URL=sqlite:///data/e2e.sqlite LLM_ENABLED=false OFFICIAL_SOURCE_MODE=fixture \
            uvicorn finresearch.api.main:app --host 127.0.0.1 --port 8000 > backend-e2e.log 2>&1 &
          echo $! > backend-e2e.pid
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health; then
              echo "Backend became healthy after ${i} attempt(s)."
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy. Backend logs:"
          cat backend-e2e.log || true
          exit 1
      - name: Playwright critical flows
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
          PLAYWRIGHT_WEB_SERVER_COMMAND: "npm run start -- --hostname 127.0.0.1 --port 3000 2>&1 | tee ../frontend-e2e.log"
        run: npm run test:e2e -- --project=chromium
      - name: Print e2e logs on failure
        if: failure()
        run: |
          echo "Backend logs:"
          cat backend-e2e.log || true
          echo "Frontend logs:"
          cat frontend-e2e.log || true
      - name: Upload e2e failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            backend-e2e.log
            frontend-e2e.log
            frontend/test-results/
            frontend/playwright-report/
